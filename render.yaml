services:
  - type: web
    name: wappy-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: HOST_URL
        sync: false
